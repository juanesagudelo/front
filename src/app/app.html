<div style="min-height: 100vh; background-color: #1a1a2e; padding: 40px 20px; font-family: 'Segoe UI', sans-serif; color: #ffffff;">

  <h1 style="text-align: center; color: #ffffff; margin-bottom: 40px; font-size: 1.8rem; font-weight: 600;">
    Gestión de Facultades
  </h1>

  <div style="background: #16213e; padding: 24px; border-radius: 8px; margin-bottom: 40px; max-width: 500px; margin-left: auto; margin-right: auto; box-shadow: 0 2px 8px rgba(0,0,0,0.4);">
    <h2 style="color: #ffffff; margin-bottom: 20px; font-size: 1.1rem;">Nueva Facultad</h2>
    <div style="display: flex; flex-direction: column; gap: 12px;">
      <input [(ngModel)]="form.nombre" placeholder="Nombre"
        style="padding: 10px 12px; background: #0f3460; border: none; border-radius: 6px; color: #ffffff; font-size: 0.95rem;" />
      <input [(ngModel)]="form.decano" placeholder="Decano"
        style="padding: 10px 12px; background: #0f3460; border: none; border-radius: 6px; color: #ffffff; font-size: 0.95rem;" />
      <input [(ngModel)]="form.ubicacion" placeholder="Ubicación"
        style="padding: 10px 12px; background: #0f3460; border: none; border-radius: 6px; color: #ffffff; font-size: 0.95rem;" />
      <button (click)="crearFacultad()"
        style="padding: 11px; background: #e94560; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 600;">
        Crear Facultad
      </button>
    </div>
  </div>

  <div style="max-width: 900px; margin: 0 auto;">
    <h2 style="color: #ffffff; margin-bottom: 16px; font-size: 1.1rem;">Facultades Registradas</h2>
    <table style="width: 100%; border-collapse: collapse;">
      <thead>
        <tr style="background: #0f3460; color: #ffffff;">
          <th style="padding: 12px 16px; text-align: left; font-weight: 600;">ID</th>
          <th style="padding: 12px 16px; text-align: left; font-weight: 600;">Nombre</th>
          <th style="padding: 12px 16px; text-align: left; font-weight: 600;">Decano</th>
          <th style="padding: 12px 16px; text-align: left; font-weight: 600;">Ubicación</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let f of facultades(); let i = index"
          [style.background]="i % 2 === 0 ? '#16213e' : '#1a1a2e'"
          style="border-bottom: 1px solid #0f3460;">
          <td style="padding: 12px 16px;">{{ f.id }}</td>
          <td style="padding: 12px 16px;">{{ f.nombre }}</td>
          <td style="padding: 12px 16px;">{{ f.decano }}</td>
          <td style="padding: 12px 16px;">{{ f.ubicacion }}</td>
        </tr>
        <tr *ngIf="facultades().length === 0">
          <td colspan="4" style="padding: 16px; text-align: center; color: #888; background: #16213e;">
            No hay facultades registradas
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
